          - heading "What Is a Regular Image Link?" [level=2] [ref=e183]:
            - strong [ref=e184]: What Is a Regular Image Link?
          - paragraph [ref=e185]: A standard image link is a URL that points to a webpage containing your image, not to the image file. When a person clicks on it, they are redirected to a page that can contain advertisements, social sharing buttons, comments, or an interface that allows a viewer to view the picture.
          - paragraph [ref=e186]: Image hosting websites such as Imgur or ImgBB have default settings for regular links. The links are alright to share casually, but when you attempt to embed the image in another place, they create issues.
