            - strong [ref=e192]: What Is a Direct Image Link?
          - paragraph [ref=e193]: One of the links is a direct image link that points directly to the image file. Upon opening it, you cannot see a webpage, advertisements, or an additional interface, just an image. These URLs typically have a file format such as a .jpg, .png, .webp, or .gif.
          - paragraph [ref=e194]: Direct links are the norm with developers, bloggers, and marketers since they can be used within HTML tags, Markdown, CSS backgrounds, and email templates without breaking.
