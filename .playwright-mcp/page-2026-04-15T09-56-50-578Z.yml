          - 'heading "Step 2: Upload Your Image" [level=3] [ref=e180]':
            - strong [ref=e181]: "Step 2: Upload Your Image"
          - paragraph [ref=e182]: Drag and drop your picture to the uploading field, or you can browse. The tool accepts JPG, PNG, WebP, GIF, and SVG up to 10MB.
          - img "IMG_0504.jpeg" [ref=e183]
          - 'heading "Step 3: Get Your Image URL" [level=3] [ref=e184]':
            - strong [ref=e185]: "Step 3: Get Your Image URL"
          - paragraph [ref=e186]: After uploading, you will be given an everlasting link to your photo. You can copy it as a direct URL, an HTML tag, or a Markdown embed, depending on your intended use.
          - img "IMG_0502.jpeg" [ref=e187]
          - 'heading "Step 4: Use It Anywhere" [level=3] [ref=e188]':
            - strong [ref=e189]: "Step 4: Use It Anywhere"
          - paragraph [ref=e190]: Copy the link in your blog, email, code, chat, or social media post. The image will be loaded on a global CDN, and this implies that it will be loaded quickly regardless of the location of your audience.
          - heading "What Makes ImageToURL.cloud Different?" [level=2] [ref=e191]:
            - strong [ref=e192]: What Makes
            - link "ImageToURL.cloud" [ref=e193] [cursor=pointer]:
              - /url: http://ImageToURL.cloud
