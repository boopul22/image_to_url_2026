name = "imagetourl2026"
compatibility_date = "2026-03-15"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "imagetourl-db"
database_id = "4cc70585-dd14-4083-9b03-6dda95846d64"
remote = true

[[r2_buckets]]
binding = "R2"
bucket_name = "imagetourl-storage"

# Image Resizing / Transformations binding. Used by src/pages/img/[...path].ts
# to resize+re-encode R2 originals to WebP at the edge.
# Requires "Transform images" enabled on the zone (Dashboard → Images → Transformations).
[images]
binding = "IMAGES"

# Run the Astro worker (middleware + SSR) BEFORE static asset matching for any
# path under a locale. Without this, Cloudflare serves dist/client/404.html
# directly for paths like /fa/<unknown-slug>/ — bypassing the middleware, so
# the cross-locale 301 redirects never fire. The worker can still serve static
# assets by calling env.ASSETS.fetch() internally.
[assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = true
